name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the work/ derivation gate can see closing commits.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Work tracking (validate + gates)
        run: pnpm run work check
      - name: Build + typecheck (packages, apps)
        run: pnpm turbo run build typecheck --filter=./packages/* --filter=./apps/*
      - name: Biome (packages)
        run: pnpm biome check packages
