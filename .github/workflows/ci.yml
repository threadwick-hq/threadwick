name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Work tracking (issue shape)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run work check
      - name: Work tracking (PR gate)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run work gate --pr "${{ github.event.number }}"
      - name: Work CLI (typecheck + tests)
        run: |
          pnpm run typecheck:scripts
          pnpm run test:scripts
      - name: Design tokens in sync
        run: |
          pnpm --filter @threadwick/core run build:tokens
          if [ -n "$(git status --porcelain -- packages/core/src/tokens packages/core/figma packages/core/docs/foundations.md)" ]; then
            echo "::error::Design tokens are stale — run 'pnpm --filter @threadwick/core run build:tokens' and commit the result."
            git --no-pager diff -- packages/core/src/tokens packages/core/figma packages/core/docs/foundations.md
            exit 1
          fi
      - name: Build + typecheck (packages, apps)
        run: pnpm turbo run build typecheck --filter=./packages/* --filter=./apps/*
      - name: Tests (packages, apps)
        run: pnpm turbo run test --filter=./packages/* --filter=./apps/*
      - name: Biome (packages, web)
        run: pnpm biome check packages apps/web
