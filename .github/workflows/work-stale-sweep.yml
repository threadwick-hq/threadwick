name: Work stale sweep

# Weekly check for active tasks held longer than the threshold.
# Opens a tracking issue when stale tasks are found (does not mutate work/ files).

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: Days before an active task is considered stale
        required: false
        default: '3'

permissions:
  contents: read
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Find stale active tasks
        id: stale
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          if pnpm exec tsx scripts/work.ts stale --days "$DAYS" --json > /tmp/stale.json; then
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            COUNT="$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/stale.json','utf8')).length)")"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Open stale-work issue
        if: steps.stale.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          for label in tw-stale-sweep tw-tracker; do
            gh label create "$label" --color ededed --force
          done
          BODY="$(node - <<'NODE'
          const tasks = JSON.parse(require('fs').readFileSync('/tmp/stale.json', 'utf8'));
          const lines = [
            'The following `work/` tasks have been `active` longer than the stale threshold.',
            'Review whether to continue, re-claim, or mark `abandoned`.',
            '',
            '| ID | Started | Assignee | Title |',
            '| --- | --- | --- | --- |',
          ];
          for (const t of tasks) {
            lines.push(`| ${t.id} | ${t.started ?? '-'} | ${t.assignee ?? '-'} | ${t.title} |`);
          }
          lines.push('', '_Generated by `.github/workflows/work-stale-sweep.yml`._');
          process.stdout.write(lines.join('\n'));
          NODE
          )"
          EXISTING="$(gh issue list --label tw-stale-sweep --state open --json number --jq '.[0].number' 2>/dev/null || true)"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Updated stale sweep comment on issue #$EXISTING"
          else
            gh issue create \
              --title "Stale active work tasks (>${DAYS} days)" \
              --label "tw-stale-sweep,tw-tracker" \
              --body "$BODY"
          fi

      - name: Close stale-work issue when clear
        if: steps.stale.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING="$(gh issue list --label tw-stale-sweep --state open --json number --jq '.[0].number' 2>/dev/null || true)"
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "No stale active tasks remain."
            echo "Closed stale sweep issue #$EXISTING"
          fi
