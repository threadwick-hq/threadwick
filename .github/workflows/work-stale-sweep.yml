name: Work stale sweep

# Weekly check for assigned open issues with no activity past the threshold.
# GitHub holds all the data now, so this is a plain issue query — no checkout.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: Days without activity before an assigned issue is stale
        required: false
        default: '3'

permissions:
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Find and report stale assigned issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          CUTOFF="$(date -u -d "-${DAYS} days" '+%Y-%m-%dT%H:%M:%SZ')"
          gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "assignee:* updated:<${CUTOFF} -label:tw-stale-sweep" \
            --json number,title,assignees,updatedAt > /tmp/stale.json
          COUNT="$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/stale.json','utf8')).length)")"
          echo "stale count: $COUNT"

          EXISTING="$(gh issue list --repo "$GITHUB_REPOSITORY" --label tw-stale-sweep --state open --json number --jq '.[0].number' 2>/dev/null || true)"

          if [ "$COUNT" = "0" ]; then
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" --repo "$GITHUB_REPOSITORY" --comment "No stale assigned issues remain."
            fi
            exit 0
          fi

          gh label create tw-stale-sweep --repo "$GITHUB_REPOSITORY" --color ededed --force
          BODY="$(node - <<'NODE'
          const issues = JSON.parse(require('fs').readFileSync('/tmp/stale.json', 'utf8'));
          const lines = [
            'The following assigned issues have had no activity past the stale threshold.',
            'Review whether to continue, unassign, or close them.',
            '',
            '| Issue | Updated | Assignees |',
            '| --- | --- | --- |',
          ];
          for (const issue of issues) {
            const assignees = (issue.assignees ?? []).map((a) => a.login).join(', ');
            lines.push(`| #${issue.number} ${issue.title} | ${issue.updatedAt} | ${assignees} |`);
          }
          lines.push('', '_Generated by `.github/workflows/work-stale-sweep.yml`._');
          process.stdout.write(lines.join('\n'));
          NODE
          )"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Stale assigned issues (>${DAYS} days without activity)" \
              --label tw-stale-sweep \
              --body "$BODY"
          fi
