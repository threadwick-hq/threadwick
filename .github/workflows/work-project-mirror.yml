name: Work project mirror

# One-way mirror of work/*.md frontmatter to GitHub Issues (+ optional Project board).
# Git remains the source of truth; nothing writes back to work/ files.

on:
  push:
    branches: [main]
    paths:
      - 'work/**'
  workflow_dispatch:

# `projects` is not a valid GITHUB_TOKEN permission key — it made the whole
# workflow file invalid, so every run failed at parse time (0s, on every push).
# Projects v2 needs a PAT anyway; the optional board step is gated on the
# WORK_PROJECT_NUMBER repo variable and degrades gracefully without one.
permissions:
  contents: read
  issues: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Export tasks
        run: pnpm exec tsx scripts/work.ts export --json > /tmp/work-tasks.json

      - name: Sync to GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORK_PROJECT_NUMBER: ${{ vars.WORK_PROJECT_NUMBER }}
          WORK_PROJECT_OWNER: ${{ vars.WORK_PROJECT_OWNER }}
        run: node .github/scripts/sync-work-project.mjs < /tmp/work-tasks.json
